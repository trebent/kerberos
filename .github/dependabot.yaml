version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/tools"
      - "/test/integration"
    schedule:
      interval: weekly
      day: monday
    groups:
      go-minor/patch-versions:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      go-minor/patch-security-versions:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directories:
      - "/docker"
    schedule:
      interval: weekly
      day: tuesday
    groups:
      docker-minor/patch-versions:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      docker-minor/patch-security-versions:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      day: wednesday
    groups:
      action-minor/patch-versions:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      action-minor/patch-security-versions:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
