name: Main branch protection

run-name: "Main branch protection: ${{ github.event.head_commit.message }}"

on:
  workflow_dispatch:
  push:
    branches:
      - main

# Should prevent concurrency on a per-branch basis.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/callable-build.yaml
    secrets: inherit

  image:
    uses: ./.github/workflows/callable-image.yaml
    secrets: inherit
    with:
      push: true

  integration-test:
    needs: image
    uses: ./.github/workflows/callable-test-integration.yaml
    secrets: inherit

  security-test:
    needs: image
    uses: ./.github/workflows/callable-test-security.yaml
    secrets: inherit
