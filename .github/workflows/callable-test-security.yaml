name: Test

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: "Version to test."
        required: false
        default: "unstable"

permissions:
  contents: read
  packages: read

jobs:
  security-test:
    env:
      VERSION: ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/suites/security/go.mod
          cache: false

      - name: Compute build cache key
        id: build-cache-key
        run: |
          checksum=$(
            {
              cat go.mod
              [ -f go.sum ] && cat go.sum
              cat Makefile
              find . -type f -name '*.go' \
                -not -path './test/suites/*' \
                -not -path './tools/*' \
                -print0 | sort -z | xargs -0 cat
              cat test/suites/security/go.mod test/suites/security/go.sum
              find test/suites/security -type f -name '*.go' -print0 | sort -z | xargs -0 cat
            } | md5sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Restore Go module cache
        id: module-cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('test/suites/security/go.sum') }}

      - name: Restore Go build cache
        id: build-cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-security-${{ steps.build-cache-key.outputs.checksum }}
          restore-keys: |
            ${{ runner.os }}-go-build-security-

      - name: Run security tests
        run: make securitytest-json

      - name: Publish security test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Security Tests
          path: build/security-test-output.json
          reporter: golang-json
          fail-on-error: "false"

      - name: Output logs if tests fail
        if: failure()
        run: |
          mkdir -p build
          make compose-logs > build/security-test.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-test-log
          path: build/security-test.log

      - name: Tear down security test environment
        if: always()
        run: make compose-security-down

      - name: Save Go module cache
        if: ${{ steps.module-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/go/pkg/mod
          key: ${{ steps.module-cache.outputs.cache-primary-key }}

      - name: Save Go build cache
        if: ${{ steps.build-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/go-build
          key: ${{ steps.build-cache.outputs.cache-primary-key }}
