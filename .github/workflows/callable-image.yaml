name: Build docker image

on:
  workflow_call:
    inputs:
      version:
        description: "Version to tag the image with."
        required: false
        type: string
        default: "unstable"
      push:
        description: "Whether to push the image to the registry."
        required: false
        type: boolean
        default: false
  release:
    types:
      - published

concurrency:
  group: image-build-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  kerberos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub packages
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: echo "version=${{ inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Add metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.version != 'unstable' }}

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/krb.Dockerfile
          push: ${{ inputs.push || github.event_name == 'release' }}
          build-args: |
            VERSION=${{ inputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=kerberos
          cache-to: type=gha,scope=kerberos,mode=max

  echo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub packages
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: echo "version=${{ inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Add metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}/echo
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.version != 'unstable' }}
          labels: |
            org.opencontainers.image.title=echo
            org.opencontainers.image.description=A simple HTTP echo server that echoes back request body and headers.

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/echo.Dockerfile
          push: ${{ inputs.push || github.event_name == 'release' }}
          build-args: |
            VERSION=${{ inputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=echo
          cache-to: type=gha,scope=echo,mode=max
