name: Build docker image

on:
  workflow_call:
    inputs:
      version:
        description: "Version to tag the image with."
        required: false
        type: string
        default: "unstable"
      push:
        description: "Whether to push the image to the registry."
        required: false
        type: boolean
        default: false
  release:
    types:
      - published

concurrency:
  group: image-build-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  kerberos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub packages
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: echo "version=${{ inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Add metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.version != 'unstable' }}

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          push: ${{ inputs.push || github.event_name == 'release' }}
          build-args: |
            VERSION=${{ inputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=kerberos
          cache-to: type=gha,scope=kerberos,mode=max

  echo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub packages
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: echo "version=${{ inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Add metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}/echo
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.version != 'unstable' }}
          labels: |
            org.opencontainers.image.title=echo
            org.opencontainers.image.description=A simple HTTP echo server that echoes back request body and headers.

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: cmd/echo/Dockerfile
          push: ${{ inputs.push || github.event_name == 'release' }}
          build-args: |
            VERSION=${{ inputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=echo
          cache-to: type=gha,scope=echo,mode=max
