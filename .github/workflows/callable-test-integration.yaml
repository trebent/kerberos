name: Test

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: "Version to test."
        required: false
        default: "unstable"

permissions:
  contents: read
  packages: read

jobs:
  integration-test:
    env:
      VERSION: ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Golang
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: test/suites/integration/go.mod
          cache: false

      - name: Compute build cache key
        id: build-cache-key
        run: |
          checksum=$(
            {
              cat go.mod
              [ -f go.sum ] && cat go.sum
              cat Makefile
              find . -type f -name '*.go' \
                -not -path './test/suites/*' \
                -not -path './tools/*' \
                -print0 | sort -z | xargs -0 cat
              cat test/suites/integration/go.mod test/suites/integration/go.sum
              find test/suites/integration -type f -name '*.go' -print0 | sort -z | xargs -0 cat
            } | md5sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Cache Go module cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: integration-test-go-mod-${{ runner.os }}-${{ hashFiles('test/suites/integration/go.sum') }}

      - name: Cache Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/go-build
          key: integration-test-go-build-${{ runner.os }}-${{ steps.build-cache-key.outputs.checksum }}
          restore-keys: |
            integration-test-go-build-${{ runner.os }}-

      - name: Run test environment
        run: make compose/up

      - name: Wait for Kerberos to be ready
        timeout-minutes: 2
        run: make compose/wait

      - name: Run integration tests
        run: make test/integration/json

      - name: Publish integration test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Integration Tests
          path: build/integration-test-output.json
          reporter: golang-json
          fail-on-error: "false"

      - name: Output logs if tests fail
        if: failure()
        run: |
          mkdir -p build
          make compose/logs > build/integration-test.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-log
          path: build/integration-test.log

      - name: Tear down Kerberos test environment
        if: always()
        run: make compose/down
