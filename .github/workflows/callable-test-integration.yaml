name: Test

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: "Version to test."
        required: false
        default: "unstable"

permissions:
  contents: read
  packages: read

jobs:
  integration-test:
    env:
      VERSION: ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/suites/integration/go.mod
          cache-dependency-path: test/suites/integration/go.sum

      - name: Run test environment
        run: make compose

      - name: Wait for Kerberos to be ready
        timeout-minutes: 2
        run: make compose-wait

      - name: Run integration tests
        run: make integrationtest-json

      - name: Publish integration test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Integration Tests
          path: build/integration-test-output.json
          reporter: golang-json
          fail-on-error: "false"

      - name: Output logs if tests fail
        if: failure()
        run: |
          mkdir -p build
          make compose-logs > build/integration-test.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-log
          path: build/integration-test.log

      - name: Tear down Kerberos test environment
        if: always()
        run: make compose-down
