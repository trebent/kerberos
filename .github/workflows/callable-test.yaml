name: Test

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: "Version to test."
        required: false
        default: "none"
      integration:
        type: boolean
        description: "Whether to run integration tests."
        required: false
        default: false

permissions:
  contents: read
  packages: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run unit tests with coverage
        run: |
          mkdir -p build
          go test -json -coverprofile=build/coverage.out -covermode=atomic ./... -timeout 20s -failfast | tee build/unit-test-output.json

      - name: Generate unit test summary
        if: always()
        run: |
          PASSED=$(jq -rs '[.[] | select(.Action == "pass" and .Test != null)] | length' build/unit-test-output.json 2>/dev/null || echo "0")
          FAILED=$(jq -rs '[.[] | select(.Action == "fail" and .Test != null)] | length' build/unit-test-output.json 2>/dev/null || echo "0")
          SKIPPED=$(jq -rs '[.[] | select(.Action == "skip" and .Test != null)] | length' build/unit-test-output.json 2>/dev/null || echo "0")
          TOTAL=$((PASSED + FAILED + SKIPPED))

          {
            echo "## Unit Test Results"
            echo ""
            echo "| Total | ✅ Passed | ❌ Failed | ⏭️ Skipped |"
            echo "|-------|-----------|-----------|-----------|"
            echo "| $TOTAL | $PASSED | $FAILED | $SKIPPED |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f build/coverage.out ]; then
            go tool cover -html=build/coverage.out -o build/coverage.html
            COVERAGE=$(go tool cover -func=build/coverage.out | grep "^total:" | awk '{print $NF}')
            {
              echo ""
              echo "### Code Coverage: $COVERAGE"
              echo ""
              echo "| Package | Coverage |"
              echo "|---------|----------|"
              awk 'NR>1 {
                split($1, a, ":")
                pkg = a[1]
                sub(/\/[^\/]+\.go$/, "", pkg)
                stmts = $2
                hit = ($3 > 0) ? $2 : 0
                total[pkg] += stmts
                covered[pkg] += hit
              }
              END {
                for (pkg in total) {
                  if (total[pkg] > 0)
                    printf "| %s | %.1f%% |\n", pkg, 100.0 * covered[pkg] / total[pkg]
                }
              }' build/coverage.out | sort
              echo "| **Total** | **$COVERAGE** |"
              echo ""
              echo "> 📄 A detailed HTML coverage report is available as a workflow artifact."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$FAILED" -gt "0" ]; then
            {
              echo ""
              echo "### ❌ Failed Tests"
              echo ""
              jq -rs '.[] | select(.Action == "fail" and .Test != null) | "- `\(.Package)/\(.Test)`"' build/unit-test-output.json
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: go-coverage-report-${{ github.sha }}
          path: build/coverage.html

  integration-test:
    if: ${{ inputs.integration == true }}
    env:
      VERSION: ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/integration/go.mod
          cache-dependency-path: test/integration/go.sum

      - name: Run test environment
        run: make compose

      - name: Wait for Kerberos to be ready
        timeout-minutes: 2
        run: make compose-wait

      - name: Run integration tests
        run: |
          mkdir -p build
          cd test/integration && go test -json ./... -count=1 -failfast | tee ../../build/integration-test-output.json

      - name: Generate integration test summary
        if: always()
        run: |
          PASSED=$(jq -rs '[.[] | select(.Action == "pass" and .Test != null)] | length' build/integration-test-output.json 2>/dev/null || echo "0")
          FAILED=$(jq -rs '[.[] | select(.Action == "fail" and .Test != null)] | length' build/integration-test-output.json 2>/dev/null || echo "0")
          SKIPPED=$(jq -rs '[.[] | select(.Action == "skip" and .Test != null)] | length' build/integration-test-output.json 2>/dev/null || echo "0")
          TOTAL=$((PASSED + FAILED + SKIPPED))

          {
            echo "## Integration Test Results"
            echo ""
            echo "| Total | ✅ Passed | ❌ Failed | ⏭️ Skipped |"
            echo "|-------|-----------|-----------|-----------|"
            echo "| $TOTAL | $PASSED | $FAILED | $SKIPPED |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt "0" ]; then
            {
              echo ""
              echo "### ❌ Failed Tests"
              echo ""
              jq -rs '.[] | select(.Action == "fail" and .Test != null) | "- `\(.Package)/\(.Test)`"' build/integration-test-output.json
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Output logs if tests fail
        if: failure()
        run: |
          mkdir -p build
          make compose-logs > build/integration-test.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: integration-test-log
          path: build/integration-test.log

      - name: Tear down Kerberos test environment
        if: always()
        run: make compose-down
