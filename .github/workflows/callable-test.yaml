name: Test

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: "Version to test."
        required: false
        default: "none"
      integration:
        type: boolean
        description: "Whether to run integration tests."
        required: false
        default: false

permissions:
  checks: write
  contents: read
  packages: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run unit tests with coverage
        run: make unittest-json

      - name: Publish unit test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Unit Tests
          path: build/unit-test-output.json
          reporter: golang-json
          fail-on-error: "false"

      - name: Generate coverage report
        if: always()
        run: |
          if [ -f build/coverage.out ]; then
            make coverage-report | grep "^### Code Coverage:" >> "$GITHUB_STEP_SUMMARY" || true
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage-report-${{ github.sha }}
          path: build/coverage.html

  security-test:
    if: ${{ inputs.integration == true }}
    env:
      VERSION: ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/suites/security/go.mod
          cache-dependency-path: test/suites/security/go.sum

      - name: Run security tests
        run: make securitytest-json

      - name: Publish security test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Security Tests
          path: build/security-test-output.json
          reporter: golang-json
          fail-on-error: "false"

      - name: Output logs if tests fail
        if: failure()
        run: |
          mkdir -p build
          make compose-logs > build/security-test.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-test-log
          path: build/security-test.log

      - name: Tear down security test environment
        if: always()
        run: make compose-security-down

  integration-test:
    if: ${{ inputs.integration == true }}
    env:
      VERSION: ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/suites/integration/go.mod
          cache-dependency-path: test/suites/integration/go.sum

      - name: Run test environment
        run: make compose

      - name: Wait for Kerberos to be ready
        timeout-minutes: 2
        run: make compose-wait

      - name: Run integration tests
        run: make integrationtest-json

      - name: Publish integration test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Integration Tests
          path: build/integration-test-output.json
          reporter: golang-json
          fail-on-error: "false"

      - name: Output logs if tests fail
        if: failure()
        run: |
          mkdir -p build
          make compose-logs > build/integration-test.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-log
          path: build/integration-test.log

      - name: Tear down Kerberos test environment
        if: always()
        run: make compose-down
