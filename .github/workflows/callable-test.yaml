name: Test

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: "Version to test."
        required: false
        default: "none"
      integration:
        type: boolean
        description: "Whether to run integration tests."
        required: false
        default: false

permissions:
  checks: write
  contents: read
  packages: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run unit tests with coverage
        run: |
          mkdir -p build
          go test -v -json -coverprofile=build/coverage.out -covermode=atomic ./... -timeout 20s -failfast | tee build/unit-test-output.json

      - name: Publish unit test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Unit Tests
          path: build/unit-test-output.json
          reporter: golang-json
          fail-on-error: 'false'

      - name: Generate coverage report
        if: always()
        run: |
          if [ -f build/coverage.out ]; then
            go tool cover -html=build/coverage.out -o build/coverage.html
            echo "### Code Coverage: $(go tool cover -func=build/coverage.out | awk '/^total:/{print $NF}')" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: go-coverage-report-${{ github.sha }}
          path: build/coverage.html

  integration-test:
    if: ${{ inputs.integration == true }}
    env:
      VERSION: ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/integration/go.mod
          cache-dependency-path: test/integration/go.sum

      - name: Run test environment
        run: make compose

      - name: Wait for Kerberos to be ready
        timeout-minutes: 2
        run: make compose-wait

      - name: Run integration tests
        run: |
          mkdir -p build
          cd test/integration && go test -v -json ./... -count=1 -failfast | tee "$GITHUB_WORKSPACE/build/integration-test-output.json"

      - name: Publish integration test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Integration Tests
          path: build/integration-test-output.json
          reporter: golang-json
          fail-on-error: 'false'

      - name: Output logs if tests fail
        if: failure()
        run: |
          mkdir -p build
          make compose-logs > build/integration-test.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: integration-test-log
          path: build/integration-test.log

      - name: Tear down Kerberos test environment
        if: always()
        run: make compose-down
