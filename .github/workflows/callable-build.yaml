name: Build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  validate-codegen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Compute build cache key
        id: build-cache-key
        run: |
          checksum=$(
            {
              cat go.mod
              [ -f go.sum ] && cat go.sum
              cat Makefile
              find . -type f -name '*.go' \
                -not -path './test/suites/*' \
                -not -path './tools/*' \
                -print0 | sort -z | xargs -0 cat
            } | md5sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Restore Go module cache
        id: module-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('go.sum') }}

      - name: Restore Go build cache
        id: build-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ steps.build-cache-key.outputs.checksum }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Codegen
        run: make codegen

      - name: Verify there are no unstaged changes
        run: |
          if ! git diff --quiet; then
            git status --porcelain
            git diff
            exit 1
          fi

      - name: Save Go module cache
        if: ${{ steps.module-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ steps.module-cache.outputs.cache-primary-key }}

      - name: Save Go build cache
        if: ${{ steps.build-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/go-build
          key: ${{ steps.build-cache.outputs.cache-primary-key }}

  go-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Compute build cache key
        id: build-cache-key
        run: |
          checksum=$(
            {
              cat go.mod
              [ -f go.sum ] && cat go.sum
              cat Makefile
              find . -type f -name '*.go' \
                -not -path './test/suites/*' \
                -not -path './tools/*' \
                -print0 | sort -z | xargs -0 cat
            } | md5sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Restore Go module cache
        id: module-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('go.sum') }}

      - name: Restore Go build cache
        id: build-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ steps.build-cache-key.outputs.checksum }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Build
        run: make go-build

      - name: Save Go module cache
        if: ${{ steps.module-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ steps.module-cache.outputs.cache-primary-key }}

      - name: Save Go build cache
        if: ${{ steps.build-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/go-build
          key: ${{ steps.build-cache.outputs.cache-primary-key }}
