name: Build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  validate-codegen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Golang
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Compute build cache key
        id: build-cache-key
        run: |
          checksum=$(
            {
              cat go.mod
              [ -f go.sum ] && cat go.sum
              cat Makefile
              find . -type f -name '*.go' \
                -not -path './test/suites/*' \
                -not -path './tools/*' \
                -print0 | sort -z | xargs -0 cat
            } | md5sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Cache Go module cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: validate-codegen-go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}

      - name: Cache Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/go-build
          key: validate-codegen-go-build-${{ runner.os }}-${{ steps.build-cache-key.outputs.checksum }}
          restore-keys: |
            validate-codegen-go-build-${{ runner.os }}-

      - name: Codegen
        run: make codegen

      - name: Verify there are no unstaged changes
        run: |
          if ! git diff --quiet; then
            git status --porcelain
            git diff
            exit 1
          fi


  go-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Golang
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Compute build cache key
        id: build-cache-key
        run: |
          checksum=$(
            {
              cat go.mod
              [ -f go.sum ] && cat go.sum
              cat Makefile
              find . -type f -name '*.go' \
                -not -path './test/suites/*' \
                -not -path './tools/*' \
                -print0 | sort -z | xargs -0 cat
            } | md5sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Cache Go module cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: go-build-go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}

      - name: Cache Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/go-build
          key: go-build-go-build-${{ runner.os }}-${{ steps.build-cache-key.outputs.checksum }}
          restore-keys: |
            go-build-go-build-${{ runner.os }}-

      - name: Build
        run: make build
