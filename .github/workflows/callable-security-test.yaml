name: Test

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: "Version to test."
        required: false
        default: "none"

permissions:
  contents: read
  packages: read

jobs:
  security-test:
    env:
      VERSION: ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/suites/security/go.mod
          cache-dependency-path: test/suites/security/go.sum

      - name: Run security tests
        run: make securitytest-json

      - name: Publish security test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Security Tests
          path: build/security-test-output.json
          reporter: golang-json
          fail-on-error: "false"

      - name: Output logs if tests fail
        if: failure()
        run: |
          mkdir -p build
          make compose-logs > build/security-test.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-test-log
          path: build/security-test.log

      - name: Tear down security test environment
        if: always()
        run: make compose-security-down
