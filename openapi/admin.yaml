# yaml-language-server: $schema=https://spec.openapis.org/oas/3.0/schema/2024-10-18
openapi: "3.0.4"
info:
  version: 0.2.0
  title: Kerberos administration API.
  description: |
    The Kerberos administration API allows administrators manage a Kerberos deployment.
components:
  schemas:
    StartDebugSessionRequest:
      type: object
      additionalProperties: false
      properties:
        durationSeconds:
          type: integer
          minimum: 60
          maximum: 3600
          default: 300
          description: Duration in seconds to keep the backend in debug mode. If not provided, the backend will be kept in debug mode until debug is disabled, or for a maximum of 1 hour. Minimum is 1 minute, defaults to 5 minutes.
    StartDebugSessionResponse:
      $ref: "#/components/schemas/DebugSession"
    DebugSession:
      type: object
      additionalProperties: false
      properties:
        sessionId:
          type: string
          description: The ID for the debug session.
        sessionStartedAt:
          type: string
          format: date-time
          description: The time when the debug session started.
        sessionExpiresAt:
          type: string
          format: date-time
          description: The time when the debug session expires.
        sessionStoppedAt:
          type: string
          format: date-time
          description: The time when the debug session was stopped. Null if the session is still active.
      required:
        - sessionId
        - sessionStartedAt
        - sessionExpiresAt
    DebugSessionOperation:
      type: object
      additionalProperties: false
      properties:
        startedAt:
          type: string
          format: date-time
          description: The time when the operation was started.
        stoppedAt:
          type: string
          format: date-time
          description: The time when the operation was stopped. Null if the operation is still active.
        url:
          type: string
          description: The full URL of the request.
        method:
          type: string
          description: The HTTP method of the operation.
        flowTransitions:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              component:
                type: string
                description: The flow component that the transition corresponds to.
              startedAt:
                type: string
                format: date-time
                description: The time when the flow transition started.
              stoppedAt:
                type: string
                format: date-time
                description: The time when the flow transition stopped. Null if the transition is still active.
              result:
                type: object
                properties:
                  outcome:
                    type: string
                    enum: [success, failure]
                  cause:
                    type: string
                    description: The cause of the flow transition result, if applicable.
                required:
                  - outcome
          description: The flow transitions that occurred during this operation, in chronological order.
      required:
        - startedAt
        - stoppedAt
        - url
        - method
        - backend
    FlowMeta:
      type: object
      properties:
        name:
          type: string
          description: The name of the flow component, e.g. "observability", "router", "auth", or "oas".
        data:
          type: object
          description: The metadata for the flow component. The structure of the metadata depends on the flow component.
          anyOf:
            - $ref: "#/components/schemas/FlowMetaDataObservability"
            - $ref: "#/components/schemas/FlowMetaDataRouter"
            - $ref: "#/components/schemas/FlowMetaDataAuth"
            - $ref: "#/components/schemas/FlowMetaDataOAS"
            - $ref: "#/components/schemas/NoFlowMetaData"
      required:
        - name
        - data
      additionalProperties: false
    FlowMetaDataObservability:
      type: object
      properties:
        enabled:
          type: boolean
      required:
        - enabled
      additionalProperties: false
    FlowMetaDataRouter:
      type: object
      additionalProperties: false
      properties:
        backends:
          type: array
          items:
            $ref: "#/components/schemas/FlowMetaDataRouterBackend"
    FlowMetaDataRouterBackend:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        host:
          type: string
        port:
          type: integer
      required:
        - name
        - host
        - port
    FlowMetaDataAuth:
      type: object
      additionalProperties: false
      properties:
        methods:
          $ref: "#/components/schemas/FlowMetaDataAuthMethods"
        scheme:
          $ref: "#/components/schemas/FlowMetaDataAuthScheme"
    FlowMetaDataAuthMethods:
      type: object
      additionalProperties: false
      properties:
        basic:
          $ref: "#/components/schemas/FlowMetaDataAuthMethodBasic"
    FlowMetaDataAuthMethodBasic:
      type: object
      additionalProperties: false
    FlowMetaDataAuthScheme:
      type: object
      additionalProperties: false
      properties:
        mappings:
          type: array
          items:
            $ref: "#/components/schemas/FlowMetaDataAuthSchemeMapping"
    FlowMetaDataAuthSchemeMapping:
      type: object
      additionalProperties: false
      properties:
        backend:
          type: string
        method:
          type: string
        exempt:
          type: array
          items:
            type: string
        authorization:
          $ref: "#/components/schemas/FlowMetaDataAuthSchemeMappingAuthorization"
      required:
        - backend
        - method
    FlowMetaDataAuthSchemeMappingAuthorization:
      type: object
      additionalProperties: false
      properties:
        groups:
          type: array
          items:
            type: string
        paths:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    FlowMetaDataOAS:
      type: object
      additionalProperties: false
      properties:
        backends:
          type: array
          items:
            type: string
    NoFlowMetaData:
      type: object
      description: No metadata for the flow component.
      additionalProperties: false
    APIErrorResponse:
      type: object
      additionalProperties: false
      properties:
        errors:
          type: array
          items:
            type: string
          minItems: 1
      required:
        - errors
  headers:
    sessionid:
      required: true
      description: A session ID.
      schema:
        type: string
  securitySchemes:
    sessionid:
      type: apiKey
      in: header
      name: x-krb-session

security:
  - sessionid: []

paths:
  # Log the superuser in.
  /api/admin/superuser/login:
    post:
      security: []
      operationId: LoginSuperuser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientId:
                  type: string
                  minLength: 1
                clientSecret:
                  type: string
                  minLength: 1
              required:
                - clientId
                - clientSecret
      responses:
        "204":
          headers:
            x-krb-session:
              $ref: "#/components/headers/sessionid"
          description: Logged the superuser in.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to log the superuser in.
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Rate limited.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  # Log the superuser out.
  /api/admin/superuser/logout:
    post:
      operationId: LogoutSuperuser
      responses:
        "204":
          description: Logged the superuser out.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  # Flow management endpoints.
  /api/admin/flow:
    get:
      operationId: GetFlow
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FlowMeta"
          description: Got the flow successfully.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/oas/{backend}:
    get:
      operationId: GetBackendOAS
      parameters:
        - name: backend
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/yaml:
              schema:
                type: object
                additionalProperties: true
          description: Got the backend OAS successfully.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Backend not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/debug/{backend}/sessions:
    post:
      operationId: StartDebugSession
      parameters:
        - name: backend
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartDebugSessionRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDebugSessionResponse"
          description: Started the backend debug session successfully.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Backend not found.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Backend is already in debug mode.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    get:
      operationId: ListDebugSessions
      parameters:
        - name: backend
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DebugSession"
          description: Got all debug sessions successfully.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Backend not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/debug/{backend}/sessions/{sessionId}:
    get:
      operationId: GetDebugSession
      parameters:
        - name: backend
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugSession"
          description: Got the debug session successfully.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Backend or debug session not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    put:
      operationId: ExtendDebugSession
      parameters:
        - name: backend
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                additionalDurationSeconds:
                  type: integer
                  minimum: 1
                  description: Additional duration in seconds to keep the backend in debug mode. Total duration cannot exceed 1 hour.
              required:
                - additionalDurationSeconds
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugSession"
          description: Extended the backend debug session successfully.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Backend or debug session not found.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Backend is not in debug mode.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
    delete:
      operationId: StopDebugSession
      parameters:
        - name: backend
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Stopped the backend debug session successfully.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Backend or debug session not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/debug/{backend}/sessions/{sessionId}/operations:
    get:
      operationId: ListDebugSessionOperations
      parameters:
        - name: backend
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DebugSessionOperation"
          description: Got all debug session operations successfully.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Backend or debug session not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
