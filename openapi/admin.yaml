# yaml-language-server: $schema=https://spec.openapis.org/oas/3.0/schema/2024-10-18
openapi: "3.0.4"
info:
  version: 0.2.0
  title: Kerberos administration API.
  description: |
    The Kerberos administration API allows administrators manage a Kerberos deployment.
components:
  requestBodies:
    CreateUserRequest:
      description: Request body for creating a user.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              username:
                type: string
                minLength: 1
              password:
                type: string
                minLength: 1
            required:
              - username
              - password
    UpdateUserRequest:
      description: Request body for updating a user.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              username:
                type: string
                minLength: 1
    ChangePasswordRequest:
      description: Request body for changing a user's password.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              oldPassword:
                type: string
                minLength: 1
              newPassword:
                type: string
                minLength: 1
            required:
              - oldPassword
              - newPassword
    UpdateUserGroupsRequest:
      description: Request body for updating a user's groups.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              groupIDs:
                type: array
                items:
                  type: integer
            required:
              - groupIDs
    LoginUserRequest:
      description: Request body for logging a user in.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              username:
                type: string
                minLength: 1
              password:
                type: string
                minLength: 1
            required:
              - username
              - password
    CreateGroupRequest:
      description: Request body for creating a group.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 1
            required:
              - name
    UpdateGroupRequest:
      description: Request body for updating a group.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 1
            required:
              - name
  responses:
    BadRequestError:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
    UnauthorizedError:
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
    ForbiddenError:
      description: Forbidden.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
    ConflictError:
      description: Conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
    NotFoundError:
      description: Not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
    InternalError:
      description: Internal error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
  schemas:
    User:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        username:
          type: string
        groups:
          type: array
          items:
            $ref: "#/components/schemas/Group"
      required:
        - id
        - username
    Group:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name
    FlowMeta:
      type: object
      properties:
        name:
          type: string
        data:
          type: object
          anyOf:
            - $ref: "#/components/schemas/FlowMetaDataObservability"
            - $ref: "#/components/schemas/FlowMetaDataRouter"
            - $ref: "#/components/schemas/FlowMetaDataAuth"
            - $ref: "#/components/schemas/FlowMetaDataOAS"
            - $ref: "#/components/schemas/NoFlowMetaData"
      required:
        - name
        - data
      additionalProperties: false
    FlowMetaDataObservability:
      type: object
      properties:
        enabled:
          type: boolean
      required:
        - enabled
      additionalProperties: false
    FlowMetaDataRouter:
      type: object
      additionalProperties: false
      properties:
        backends:
          type: array
          items:
            $ref: "#/components/schemas/FlowMetaDataRouterBackend"
    FlowMetaDataRouterBackend:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        host:
          type: string
        port:
          type: integer
      required:
        - name
        - host
        - port
    FlowMetaDataAuth:
      type: object
      additionalProperties: false
      properties:
        methods:
          $ref: "#/components/schemas/FlowMetaDataAuthMethods"
        scheme:
          $ref: "#/components/schemas/FlowMetaDataAuthScheme"
    FlowMetaDataAuthMethods:
      type: object
      additionalProperties: false
      properties:
        basic:
          $ref: "#/components/schemas/FlowMetaDataAuthMethodBasic"
    FlowMetaDataAuthMethodBasic:
      type: object
      additionalProperties: false
    FlowMetaDataAuthScheme:
      type: object
      additionalProperties: false
      properties:
        mappings:
          type: array
          items:
            $ref: "#/components/schemas/FlowMetaDataAuthSchemeMapping"
    FlowMetaDataAuthSchemeMapping:
      type: object
      additionalProperties: false
      properties:
        backend:
          type: string
        method:
          type: string
        exempt:
          type: array
          items:
            type: string
        authorization:
          $ref: "#/components/schemas/FlowMetaDataAuthSchemeMappingAuthorization"
      required:
        - backend
        - method
    FlowMetaDataAuthSchemeMappingAuthorization:
      type: object
      additionalProperties: false
      properties:
        groups:
          type: array
          items:
            type: string
        paths:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    FlowMetaDataOAS:
      type: object
      additionalProperties: false
      properties:
        backends:
          type: array
          items:
            type: string
    NoFlowMetaData:
      type: object
      description: No metadata for the flow component.
      additionalProperties: false
    APIErrorResponse:
      type: object
      additionalProperties: false
      properties:
        errors:
          type: array
          items:
            type: string
          minItems: 1
      required:
        - errors
  headers:
    sessionid:
      required: true
      description: A session ID.
      schema:
        type: string
  securitySchemes:
    sessionid:
      type: apiKey
      in: header
      name: x-krb-session

security:
  - sessionid: []

paths:
  #
  # Superuser management endpoints.
  #

  /api/admin/superuser/login:
    post:
      security: []
      operationId: LoginSuperuser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientId:
                  type: string
                  minLength: 1
                clientSecret:
                  type: string
                  minLength: 1
              required:
                - clientId
                - clientSecret
      responses:
        "204":
          headers:
            x-krb-session:
              $ref: "#/components/headers/sessionid"
          description: Logged the superuser in.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Bad request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Failed to log the superuser in.
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Rate limited.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/superuser/logout:
    post:
      operationId: LogoutSuperuser
      responses:
        "204":
          description: Logged the superuser out.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  #
  # User management endpoints.
  #

  /api/admin/users:
    post:
      operationId: CreateUser
      requestBody:
        $ref: "#/components/requestBodies/CreateUserRequest"
      responses:
        "201":
          description: Created the user successfully.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      operationId: GetUsers
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
          description: Got the users successfully.
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/admin/users/{userID}:
    get:
      operationId: GetUser
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: Got the user successfully.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      operationId: UpdateUser
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        $ref: "#/components/requestBodies/UpdateUserRequest"
      responses:
        "204":
          description: Updated the user successfully.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: DeleteUser
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted the user successfully.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/admin/users/{userID}/password:
    put:
      operationId: ChangeUserPassword
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        $ref: "#/components/requestBodies/ChangePasswordRequest"
      responses:
        "204":
          description: Changed the user's password successfully.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/admin/users/{userID}/groups:
    put:
      operationId: UpdateUserGroups
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        $ref: "#/components/requestBodies/UpdateUserGroupsRequest"
      responses:
        "204":
          description: Updated the user's groups successfully.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/admin/login:
    post:
      security: []
      operationId: Login
      requestBody:
        $ref: "#/components/requestBodies/LoginUserRequest"
      responses:
        "204":
          headers:
            x-krb-session:
              $ref: "#/components/headers/sessionid"
          description: Logged the user in.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/admin/logout:
    post:
      operationId: Logout
      responses:
        "204":
          description: Logged the user out successfully.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/admin/groups:
    post:
      operationId: CreateGroup
      requestBody:
        $ref: "#/components/requestBodies/CreateGroupRequest"
      responses:
        "201":
          description: Created the group successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      operationId: GetGroups
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
          description: Got the groups successfully.
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/admin/groups/{groupID}:
    get:
      operationId: GetGroup
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
          description: Got the group successfully.
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      operationId: UpdateGroup
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        $ref: "#/components/requestBodies/UpdateGroupRequest"
      responses:
        "204":
          description: Updated the group successfully.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: DeleteGroup
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted the group successfully.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  #
  # Flow management endpoints.
  #

  /api/admin/flow:
    get:
      operationId: GetFlow
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FlowMeta"
          description: Got the flow successfully.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.

  /api/admin/oas/{backend}:
    get:
      operationId: GetBackendOAS
      parameters:
        - name: backend
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/yaml:
              schema:
                type: object
                additionalProperties: true
          description: Got the backend OAS successfully.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Backend not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Internal error.
